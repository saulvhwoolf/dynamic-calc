<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Nuzlocke Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ag-grid/31.0.1/ag-grid-community.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/styles/ag-theme-alpine-dark.css">
    <link type="text/css" rel="stylesheet" href="./css/frags.css?2f51c9704" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>



    <style>
       
    </style>
</head>
<body>
    <div class="container">
        <header id="sheet-header">
            <h1 id="sheet-title">Sheet</h1>
            <a href="https://github.com/hzla/Dynamic-Calc/wiki/Fragsheet-Features-(Currently-WIP)" target="_blank"><div id="how-to">How to Use</div></a>
        </header>

        <div id="sheet-btns">
            <div class="sheet-btn" id="import-sheet"><span class="btn-icon">↑</span> Import</div>
            <div class="sheet-btn" id="export-sheet"><span class="btn-icon">↓</span> Export</div>
            <div class="sheet-btn" id="reload-box-battlelog"><span class="btn-icon">↻</span> Reload from box &amp; battlelog</div>
        </div>

        <div id="view-tabs">
            <div class="view-tab active" data-view="fragsheet">Fragsheet</div>
            <div class="view-tab" data-view="battle-log">Battle Log</div>
        </div>

        <div id="battle-log-split-tabs" aria-label="Battle log split filters"></div>

        <div id="tabs">
            <div class="tab active" id="all-simple-tab" data-split="all-simple">All Splits Consolidated</div>
            <div class="tab" id="all-tab" data-split="all">All Splits Detailed</div>
            <div class="tab" id="split-0-tab" data-split="0"></div>
            <div class="tab" id="split-1-tab" data-split="1"></div>
            <div class="tab" id="split-2-tab" data-split="2"></div>
            <div class="tab" id="split-3-tab" data-split="3"></div>
            <div class="tab" id="split-4-tab" data-split="4"></div>
            <div class="tab" id="split-5-tab" data-split="5"></div>
            <div class="tab" id="split-6-tab" data-split="6"></div>
            <div class="tab" id="split-7-tab" data-split="7"></div>
            <div class="tab" id="split-8-tab" data-split="8"></div>
            <div class="tab" id="stats-tab" data-split="9">Mon Stats/IVs</div>
        </div>

        <div id="myGrid" class="ag-theme-alpine-dark"></div>

        <div id="battle-log-view">
            <div id="battle-log-toolbar">
                <button type="button" id="sync-battle-log" class="battle-log-toolbar-btn">Sync</button>
                <button type="button" id="load-battle-log-file" class="battle-log-toolbar-btn">Load Battle Log (from Desmume Save Folder "Battery/Dumps")</button>
                <input type="file" id="battle-log-file-input" accept=".json,application/json" hidden>
                <div id="battle-log-upload-status" class="battle-log-note" style="display:none; margin: 0;">Not synced yet.</div>
            </div>
            <div id="battle-log-container"></div>
        </div>

        <div id="tooltip">
            
        </div>

        <div id="frag-history">
            <h2 id="stat-title">Click Row to Show Battle History</h2>

            <div class="split-container" id="split-1-container">

            </div>

            <div id="battle-log-fragsheet-panel" aria-live="polite"></div>
        </div>

        <div id="delete-btns">
            <div id="delete-enc">Delete</div>
            <div id="reset-sheet">Reset Sheet</div>
        </div>
    </div>

 

    

    <script type="text/javascript" src="./calc/data/evos.js?100001"></script>
    <script type="text/javascript" src="./calc/data/splits.js?100003"></script>
    <script type="text/javascript" src="./js/savereaders/enums.js?100000"></script>
    <script type="text/javascript" src="./js/savereaders/save_constants/null_constants.js?100000"></script>
    <script type="text/javascript" src="./js/savereaders/save_constants/em_imp_constants.js?100000"></script>
    <script type="text/javascript" src="./js/savereaders/save_constants/em_imp_primary_abils.js?100000"></script>
    <script type="text/javascript" src="./js/fragsheet/aggrid_options.js?100008"></script>
    <script type="text/javascript" src="./js/fragsheet/controls.js?100000"></script>
    <script type="text/javascript" src="./js/fragsheet/move_changes.js?100000"></script>
    <script type="text/javascript" src="./js/fragsheet/battle_log.js?6cf677ab"></script>
</body>
</html>
